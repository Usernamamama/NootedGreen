name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default

      - name: Build and Analyze
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          
          xcodebuild clean build analyze \
            -scheme "$scheme" \
            -"$filetype_parameter" "$file_to_build" \
            -derivedDataPath build \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Package Kext Artifacts
        run: |
          cd build/Build/Products/Debug* || cd build/Build/Products/Release* || cd build/Build/Products/*
          
          ls -d *.kext
          
          zip -r -y ../../../nootedgreen.zip *.kext

      - name: Create and Upload to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="build-$(date +'%Y.%m.%d')-b${{ github.run_number }}"
          
          echo "Generating: $TAG_NAME..."
          gh release create "$TAG_NAME" build/nootedgreen.zip \
            --title "Kext Release $TAG_NAME" \
            --notes "Autobuild for (.kext) commit: ${{ github.sha }}."
